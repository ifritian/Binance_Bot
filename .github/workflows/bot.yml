name: Square Signal Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run bot
        env:
          FOLLOWUP_CHANNEL_USERNAME: ${{ secrets.FOLLOWUP_CHANNEL_USERNAME }}
          BINANCE_SQUARE_API_KEY: ${{ secrets.BINANCE_SQUARE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_VISION_MODEL: ${{ secrets.GROQ_VISION_MODEL }}
          MIN_POST_INTERVAL_HOURS: ${{ secrets.MIN_POST_INTERVAL_HOURS }}
          OPINION_INTERVAL_HOURS: ${{ secrets.OPINION_INTERVAL_HOURS }}
          ARTICLE_INTERVAL_HOURS: ${{ secrets.ARTICLE_INTERVAL_HOURS }}
        run: python main.py
      
      - name: Commit state
        if: always()
        run: |
          git config user.email "bot@github.com"
          git config user.name "Bot"
          git add bot_state.db
          git commit -m "Auto: update bot state" || true
          git push