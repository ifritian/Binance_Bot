name: Square Signal Bot

# Запуск раз в 10 минут. GitHub Actions гарантирует "не чаще", но
# во время нагрузки на сервисы GitHub запуск может задержаться на
# несколько минут - для интервалов 4ч/2дня/неделя это не критично.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}  # позволяет запустить вручную кнопкой "Run workflow" на GitHub
  push:
    branches: [main]  # запуск при любом коммите в main - удобно как замена кнопке "Run workflow" с телефона

# Нужно явно разрешить workflow коммитить изменения обратно в репозиторий
permissions:
  contents: write

# Защита от параллельных запусков - если предыдущий прогон ещё не
# закончился (например, нажали "Run workflow" вручную во время
# обычного запуска по расписанию), новый запуск ждёт очереди вместо
# того чтобы стартовать параллельно. Это и вызывало 409 Conflict
# от Telegram (getUpdates разрешает только одно подключение на бота).
concurrency:
  group: square-signal-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one bot check
        env:
          FOLLOWUP_CHANNEL_USERNAME: ${{ secrets.FOLLOWUP_CHANNEL_USERNAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BINANCE_SQUARE_API_KEY: ${{ secrets.BINANCE_SQUARE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_VISION_MODEL: ${{ secrets.GROQ_VISION_MODEL }}
          MIN_POST_INTERVAL_HOURS: ${{ secrets.MIN_POST_INTERVAL_HOURS }}
          OPINION_INTERVAL_HOURS: ${{ secrets.OPINION_INTERVAL_HOURS }}
          ARTICLE_INTERVAL_HOURS: ${{ secrets.ARTICLE_INTERVAL_HOURS }}
        run: python main.py --once

      - name: Show queue state (diagnostics)
        if: always()
        run: python check_state.py

      - name: Save bot state back to the repository
        run: |
          git config user.name "square-signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bot_state.db
          git diff --quiet --cached || git commit -m "Обновление состояния бота [skip ci]"
          git push